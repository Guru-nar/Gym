<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="#111111"/>
  <!-- Dumbbell: center bar -->
  <rect x="176" y="240" width="160" height="32" rx="8" fill="#2563eb"/>
  <!-- Left collar (inner plate holder) -->
  <rect x="136" y="216" width="40" height="80" rx="8" fill="#2563eb"/>
  <!-- Right collar -->
  <rect x="336" y="216" width="40" height="80" rx="8" fill="#2563eb"/>
  <!-- Left outer weight plate -->
  <rect x="96" y="192" width="40" height="128" rx="12" fill="#1d4ed8"/>
  <!-- Right outer weight plate -->
  <rect x="376" y="192" width="40" height="128" rx="12" fill="#1d4ed8"/>
  <!-- Left plate handle cap -->
  <rect x="88" y="208" width="14" height="96" rx="7" fill="#1e40af"/>
  <!-- Right plate handle cap -->
  <rect x="410" y="208" width="14" height="96" rx="7" fill="#1e40af"/>
  <!-- Shine on left plate -->
  <rect x="100" y="206" width="8" height="36" rx="4" fill="rgba(255,255,255,0.12)"/>
  <!-- Shine on right plate -->
