<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GymGuru</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymGuru">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0f0f0f">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;}
:root{--blue:#2563eb;--green:#16a34a;--bg:#0f0f0f;--card:#1a1a1a;--card2:#222;--border:#2a2a2a;--text:#fff;--muted:#888;--dim:#444;--red:#991b1b;}
html,body{background:var(--bg);height:100%;overflow:hidden;}
.app{background:var(--bg);width:100%;height:100vh;overflow:hidden;position:relative;}
.screen{display:none;flex-direction:column;height:100vh;background:var(--bg);position:absolute;top:0;left:0;width:100%;}
.screen.active{display:flex;}
.topbar{padding:52px 20px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-title{font-size:18px;font-weight:600;color:var(--text);flex:1;}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--card2);border:none;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.scroll{flex:1;overflow-y:auto;padding:0 16px 120px;}
.scroll::-webkit-scrollbar{display:none;}
.bottom{padding:12px 16px 40px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;border-top:0.5px solid var(--border);}
.btn{width:100%;border:none;border-radius:14px;font-size:15px;font-weight:600;padding:16px;cursor:pointer;touch-action:manipulation;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-dark{background:var(--card2);color:var(--text);}
.btn-red{background:var(--red);color:#fff;}
.card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:0.5px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dn{text-align:center;font-size:11px;color:var(--dim);padding:6px 0;}
.cal-d{text-align:center;padding:9px 0;font-size:14px;color:var(--muted);cursor:pointer;border-radius:8px;position:relative;}
.cal-d.today{background:var(--blue);color:#fff;font-weight:600;}
.cal-d.has-w::after{content:'';width:4px;height:4px;background:var(--blue);border-radius:50%;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);}
.cal-d.other{color:#333;}
.tag{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;}
.tag-blue{background:#1e3a6e;color:#93c5fd;}
input[type=number]{background:var(--card2);border:0.5px solid var(--border);border-radius:8px;color:var(--blue);font-size:17px;font-weight:600;text-align:center;padding:8px 4px;width:100%;outline:none;}
input[type=text]{background:var(--card2);border:0.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:12px 14px;width:100%;outline:none;}
input::placeholder{color:var(--dim);}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 36px 32px;gap:5px;padding:9px 0;border-bottom:0.5px solid #1e1e1e;align-items:center;}
.set-hdr{display:grid;grid-template-columns:32px 1fr 1fr 36px 32px;gap:5px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.set-hdr span{color:var(--dim);font-size:12px;text-align:center;}
.set-num{color:var(--muted);font-size:14px;text-align:center;}
.chk{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--dim);background:transparent;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;}
.chk.done{background:var(--green);border-color:var(--green);}
.chk.done::after{content:'✓';color:#fff;font-size:14px;font-weight:700;}
.del-btn{width:28px;height:28px;border-radius:50%;border:none;background:#2a1515;color:#f87171;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;flex-shrink:0;}
.active-ex-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:0.5px solid var(--border);cursor:pointer;}
.active-ex-card.current-ex{border-color:var(--blue);}
.prog-bar{height:4px;background:var(--card2);border-radius:2px;margin:8px 0 4px;}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}
.ex-sugg{padding:13px 0;border-bottom:0.5px solid #1e1e1e;color:#ddd;font-size:14px;cursor:pointer;}
@keyframes greenPulse{0%{background:#15803d}50%{background:#16a34a}100%{background:#15803d}}
.alarm-screen{animation:greenPulse 0.8s infinite;}
/* swipe delete hint */
.workout-row{position:relative;overflow:hidden;border-radius:14px;margin-bottom:10px;}
.workout-row .del-overlay{position:absolute;right:0;top:0;bottom:0;width:80px;background:#7f1d1d;display:flex;align-items:center;justify-content:center;color:#fca5a5;font-size:13px;font-weight:600;cursor:pointer;border-radius:0 14px 14px 0;}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->

<div class="screen active" id="s-home">
  <div class="topbar">
    <div style="flex:1">
      <div style="color:var(--muted);font-size:12px;" id="home-date"></div>
      <div style="color:var(--text);font-size:20px;font-weight:700;">I tuoi allenamenti</div>
    </div>
  </div>
  <div class="scroll">
    <div style="background:var(--card);border-radius:18px;padding:14px;margin-bottom:20px;border:0.5px solid var(--border);">
      <div style="text-align:center;color:var(--muted);font-size:13px;padding:4px 0 12px;" id="month-label"></div>
      <div class="cal-grid" id="day-names"></div>
      <div class="cal-grid" id="cal-body"></div>
    </div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:10px;">Allenamenti salvati</div>
    <div id="workout-list-home"></div>
  </div>
  <div class="bottom">
    <button class="btn btn-blue" onclick="openNewWorkout()">+ Nuovo allenamento</button>
  </div>
</div>

<!-- SCHERMATA ALLENAMENTO -->

<div class="screen" id="s-workout">
  <div class="topbar">
    <button class="back-btn" onclick="goScreen('s-home')">&#8249;</button>
    <div class="topbar-title" id="workout-title-display" onclick="renameWorkout()" style="cursor:pointer;border-bottom:1px dashed #444;display:inline-block;max-width:200px;">Allenamento</div>
    <div style="color:var(--muted);font-size:12px;" id="workout-date-display"></div>
  </div>
  <div class="scroll">
    <div id="workout-exercise-list"></div>
    <div style="margin-top:4px;">
      <button class="btn btn-dark" onclick="showAddExModal()" style="border:0.5px dashed var(--dim);background:transparent;color:var(--muted);">+ Aggiungi esercizio</button>
    </div>
  </div>
  <div class="bottom">
    <button class="btn btn-blue" onclick="startWorkout()">Inizia allenamento</button>
    <button class="btn btn-red" onclick="deleteCurrentWorkout()" style="font-size:13px;padding:12px;opacity:.7;">Elimina questo allenamento</button>
  </div>
</div>

<!-- ALLENAMENTO ATTIVO -->

<div class="screen" id="s-active">
  <div class="topbar">
    <button class="back-btn" onclick="goScreen('s-workout')">&#8249;</button>
    <div class="topbar-title" id="active-workout-name"></div>
    <div style="color:var(--blue);font-size:14px;font-weight:600;" id="active-clock">00:00</div>
  </div>
  <div class="scroll"><div id="active-ex-list"></div></div>
  <div class="bottom">
    <button class="btn btn-green" onclick="finishWorkout()">Termina allenamento</button>
  </div>
</div>

<!-- DETTAGLIO ESERCIZIO -->

<div class="screen" id="s-ex-detail">
  <div class="topbar">
    <button class="back-btn" onclick="backToActive()">&#8249;</button>
    <div class="topbar-title" id="ex-detail-name" onclick="renameExercise()" style="cursor:pointer;border-bottom:1px dashed #444;display:inline-block;max-width:180px;"></div>
    <div id="ex-progress-badge" class="tag tag-blue" style="font-size:12px;"></div>
  </div>
  <div class="scroll">
    <div style="background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:16px;border:0.5px solid var(--border);">
      <div style="color:var(--muted);font-size:11px;margin-bottom:10px;letter-spacing:.5px;">TIMER PAUSA</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="flex:1;display:flex;align-items:center;gap:8px;">
          <input type="number" id="global-timer-input" min="0" max="600" value="90" style="width:70px;font-size:22px;" oninput="applyGlobalTimer()"/>
          <span style="color:var(--muted);font-size:13px;">sec</span>
        </div>
        <button class="btn btn-dark" style="width:auto;padding:10px 14px;font-size:13px;border-radius:10px;" onclick="applyGlobalTimer()">Applica a tutti</button>
      </div>
    </div>
    <div class="set-hdr">
      <span>Set</span><span>Kg</span><span>Reps</span><span></span><span></span>
    </div>
    <div id="detail-sets-body"></div>
    <div style="display:grid;grid-template-columns:32px 1fr 1fr 36px 32px;gap:5px;padding:10px 0;align-items:center;cursor:pointer;" onclick="addSetToEx()">
      <div style="color:var(--blue);font-size:22px;text-align:center;font-weight:300;">+</div>
      <div style="background:var(--card2);border-radius:8px;padding:8px;text-align:center;color:var(--dim);font-size:15px;">—</div>
      <div style="background:var(--card2);border-radius:8px;padding:8px;text-align:center;color:var(--dim);font-size:15px;">—</div>
      <div></div><div></div>
    </div>
    <div style="margin-top:8px;">
      <div style="color:var(--muted);font-size:11px;margin-bottom:6px;letter-spacing:.5px;">NOTE</div>
      <input type="text" id="ex-note-input" placeholder="Es. presa larga, schiena dritta..." oninput="saveNote()" style="font-size:14px;padding:10px 12px;"/>
    </div>
    <div style="margin-top:16px;">
      <button class="btn btn-red" style="font-size:13px;padding:12px;opacity:.7;" onclick="deleteCurrentExercise()">Elimina esercizio</button>
    </div>
  </div>
  <div class="bottom">
    <div style="color:var(--muted);font-size:13px;margin-bottom:4px;" id="current-set-label">Set 1</div>
    <button class="btn btn-blue" onclick="logCurrentSet()">Segna set fatto + pausa ▶</button>
  </div>
</div>

<!-- TIMER PAUSA -->

<div class="screen" id="s-timer">
  <div style="display:flex;flex-direction:column;height:100vh;background:#0a0a0a;align-items:center;justify-content:center;padding:32px 24px;">
    <div style="color:var(--muted);font-size:13px;margin-bottom:4px;" id="timer-label">Pausa</div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:20px;" id="timer-next-info"></div>
    <div style="position:relative;width:220px;height:220px;margin:0 auto 24px;">
      <svg width="220" height="220" style="transform:rotate(-90deg)">
        <circle cx="110" cy="110" r="98" fill="none" stroke="#1a1a1a" stroke-width="12"/>
        <circle cx="110" cy="110" r="98" fill="none" stroke="var(--blue)" stroke-width="12" stroke-linecap="round" id="timer-ring" stroke-dasharray="616" stroke-dashoffset="0"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
        <div style="font-size:58px;font-weight:700;color:var(--text);letter-spacing:-2px;" id="timer-big">1:30</div>
        <div style="font-size:12px;color:var(--muted);">secondi rimanenti</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;width:100%;max-width:320px;margin-bottom:10px;">
      <button class="btn btn-dark" style="flex:1;" onclick="adjustTimer(-15)">−15s</button>
      <button class="btn btn-dark" style="flex:1;" onclick="adjustTimer(15)">+15s</button>
    </div>
    <button class="btn btn-red" style="max-width:320px;" onclick="skipTimer()">Salta pausa</button>
  </div>
</div>

<!-- SCHERMATA ALLARME VERDE -->

<div class="screen" id="s-alarm">
  <div class="alarm-screen" style="display:flex;flex-direction:column;height:100vh;align-items:center;justify-content:center;padding:32px 24px;">
    <div style="font-size:80px;margin-bottom:16px;">💪</div>
    <div style="color:#fff;font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;">Pausa finita!</div>
    <div style="color:rgba(255,255,255,0.8);font-size:16px;text-align:center;margin-bottom:48px;" id="alarm-next-label">Pronto per il prossimo set?</div>
    <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;">
      <button onclick="goNextSet()" style="width:100%;border:none;border-radius:16px;font-size:17px;font-weight:700;padding:18px;cursor:pointer;background:#fff;color:#15803d;">Prossimo set ▶</button>
      <button onclick="silenceAlarm()" style="width:100%;border:2px solid rgba(255,255,255,0.5);border-radius:16px;font-size:15px;font-weight:600;padding:16px;cursor:pointer;background:transparent;color:#fff;">🔇 Silenzia</button>
      <button onclick="backToActiveFromAlarm()" style="width:100%;border:none;border-radius:16px;font-size:14px;font-weight:500;padding:14px;cursor:pointer;background:rgba(0,0,0,0.25);color:rgba(255,255,255,0.8);">Torna all'allenamento</button>
    </div>
  </div>
</div>

<!-- MODAL AGGIUNGI ESERCIZIO -->

<div id="modal-add-ex" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;">
  <div style="width:100%;height:100%;background:rgba(0,0,0,.65);" onclick="closeModal()"></div>
  <div style="position:absolute;bottom:0;left:0;right:0;background:#161616;border-radius:24px 24px 0 0;padding:24px 20px 48px;">
    <div style="color:var(--text);font-size:17px;font-weight:600;margin-bottom:16px;">Aggiungi esercizio</div>
    <input type="text" id="ex-search-input" placeholder="Nome esercizio..." oninput="filterSugg()" style="margin-bottom:12px;"/>
    <div id="sugg-list" style="max-height:180px;overflow-y:auto;"></div>
    <button class="btn btn-blue" style="margin-top:16px;" onclick="addExerciseFromModal()">Aggiungi esercizio</button>
  </div>
</div>

<!-- MODAL NUOVO ALLENAMENTO -->

<div id="modal-new-workout" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;">
  <div style="width:100%;height:100%;background:rgba(0,0,0,.65);" onclick="closeNewWorkoutModal()"></div>
  <div style="position:absolute;bottom:0;left:0;right:0;background:#161616;border-radius:24px 24px 0 0;padding:24px 20px 48px;">
    <div style="color:var(--text);font-size:17px;font-weight:600;margin-bottom:16px;">Nuovo allenamento</div>
    <input type="text" id="workout-name-input" placeholder="Es. Petto &amp; Tricipiti" style="margin-bottom:16px;"/>
    <button class="btn btn-blue" onclick="createWorkout()">Crea allenamento</button>
  </div>
</div>

<!-- MODAL RINOMINA -->

<div id="modal-rename" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;">
  <div style="width:100%;height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="background:#1a1a1a;border-radius:20px;padding:24px;width:100%;max-width:340px;border:0.5px solid #333;">
      <div style="color:var(--text);font-size:17px;font-weight:600;margin-bottom:16px;" id="rename-title">Rinomina</div>
      <input type="text" id="rename-input" placeholder="Nuovo nome..." style="margin-bottom:20px;font-size:16px;"/>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-dark" style="flex:1;padding:14px;" onclick="closeRename()">Annulla</button>
        <button class="btn btn-blue" style="flex:1;padding:14px;" onclick="confirmRename()">Salva</button>
      </div>
    </div>
  </div>
</div>
<div id="modal-confirm" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;">
  <div style="width:100%;height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:24px;">
    <div style="background:#1a1a1a;border-radius:20px;padding:24px;width:100%;max-width:340px;border:0.5px solid #333;">
      <div style="color:var(--text);font-size:17px;font-weight:600;margin-bottom:8px;" id="confirm-title">Eliminare?</div>
      <div style="color:var(--muted);font-size:14px;margin-bottom:24px;" id="confirm-body">Questa azione non può essere annullata.</div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-dark" style="flex:1;padding:14px;" onclick="closeConfirm()">Annulla</button>
        <button class="btn btn-red" style="flex:1;padding:14px;" id="confirm-ok-btn">Elimina</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUGGS=['Panca piana','Panca inclinata','Croci manubri','Dips','Push up','Squat bilanciere','Leg press','Affondi','Stacco da terra','Leg curl','Lat machine','Rematore bilanciere','Trazioni','Curl bicipiti','Hammer curl','Tricipiti cavi','French press','Shoulder press','Alzate laterali','Plank','Calf raises','Cable fly','Face pull','Shrug','Hip thrust','Romanian deadlift'];

let workouts=[];
let currentWorkoutIdx=null;
let currentExIdx=null;
let currentSetIdx=0;
let timerInterval=null;
let timerRemaining=0;
let timerTotal=0;
let clockInterval=null;
let clockSec=0;
let audioCtx=null;
let alarmNodes=[];
let alarmSilenced=false;
let _goNextFn=null;

/* ── AUDIO ── */
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playShortBeep(freq,dur){
  try{
    const ctx=getCtx();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.5,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function startAlarmSound(){
  stopAlarmSound();
  alarmSilenced=false;
  function beepCycle(){
    if(alarmSilenced) return;
    try{
      const ctx=getCtx();
      [880,1100,880,1320].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        const t=ctx.currentTime+i*0.18;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.6,t+0.04);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.16);
        o.start(t);o.stop(t+0.18);
        alarmNodes.push(o);
      });
    }catch(e){}
    if(!alarmSilenced) window._alarmTO=setTimeout(beepCycle,1200);
  }
  beepCycle();
}
function stopAlarmSound(){
  alarmSilenced=true;
  if(window._alarmTO) clearTimeout(window._alarmTO);
  alarmNodes.forEach(n=>{try{n.stop();}catch(e){}});
  alarmNodes=[];
}
function silenceAlarm(){stopAlarmSound();}

/* ── NAVIGAZIONE ── */
function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function backToActive(){renderActiveScreen();goScreen('s-active');}
function backToActiveFromAlarm(){stopAlarmSound();renderActiveScreen();goScreen('s-active');}

/* ── RINOMINA ── */
let _renameCallback = null;
function openRenameModal(title, currentName, onSave) {
  document.getElementById('rename-title').textContent = title;
  document.getElementById('rename-input').value = currentName;
  _renameCallback = onSave;
  document.getElementById('modal-rename').style.display = 'block';
  setTimeout(() => {
    const inp = document.getElementById('rename-input');
    inp.focus(); inp.select();
  }, 100);
}
function closeRename() {
  document.getElementById('modal-rename').style.display = 'none';
  _renameCallback = null;
}
function confirmRename() {
  const val = document.getElementById('rename-input').value.trim();
  if (!val) return;
  if (_renameCallback) _renameCallback(val);
  closeRename();
}
function renameWorkout() {
  const w = workouts[currentWorkoutIdx];
  openRenameModal('Rinomina allenamento', w.name, (newName) => {
    w.name = newName;
    document.getElementById('workout-title-display').textContent = newName;
    document.getElementById('active-workout-name').textContent = newName;
    renderAllWorkouts();
  });
}
function renameExercise() {
  const ex = workouts[currentWorkoutIdx].exercises[currentExIdx];
  openRenameModal('Rinomina esercizio', ex.name, (newName) => {
    ex.name = newName;
    document.getElementById('ex-detail-name').textContent = newName;
    renderWorkoutScreen();
    renderActiveScreen();
  });
}
function showConfirm(title,body,onOk){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-body').textContent=body;
  document.getElementById('confirm-ok-btn').onclick=()=>{closeConfirm();onOk();};
  document.getElementById('modal-confirm').style.display='block';
}
function closeConfirm(){document.getElementById('modal-confirm').style.display='none';}

/* ── CALENDARIO ── */
function buildCalendar(){
  const now=new Date();
  const months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const days=['Lu','Ma','Me','Gi','Ve','Sa','Do'];
  document.getElementById('month-label').textContent=months[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('home-date').textContent=now.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('day-names').innerHTML=days.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  const y=now.getFullYear(),m=now.getMonth(),today=now.getDate();
  const first=new Date(y,m,1).getDay();
  const off=(first===0)?6:first-1;
  const dim=new Date(y,m+1,0).getDate();
  const prev=new Date(y,m,0).getDate();
  let h='';
  for(let i=off-1;i>=0;i--) h+=`<div class="cal-d other">${prev-i}</div>`;
  for(let d=1;d<=dim;d++){
    const isT=d===today;
    const hasW=workouts.some(w=>w.day===d&&w.month===m&&w.year===y);
    h+=`<div class="cal-d${isT?' today':''}${hasW?' has-w':''}" onclick="dayClick(${d},${m},${y})">${d}</div>`;
  }
  const rem=42-off-dim;
  for(let i=1;i<=Math.max(0,rem);i++) h+=`<div class="cal-d other">${i}</div>`;
  document.getElementById('cal-body').innerHTML=h;
}

function dayClick(d,m,y){
  const filtered=workouts.filter(w=>w.day===d&&w.month===m&&w.year===y);
  const list=document.getElementById('workout-list-home');
  if(filtered.length===0){
    list.innerHTML=`<div class="card" style="border:0.5px dashed var(--dim);background:transparent;text-align:center;">
      <div style="color:var(--muted);font-size:14px;margin-bottom:12px;">${d}/${m+1} — Nessun allenamento</div>
      <button class="btn btn-blue" style="padding:12px;" onclick="openNewWorkout()">+ Crea allenamento</button>
    </div>`;
    return;
  }
  renderHomeList(filtered);
}

function renderAllWorkouts(){
  const list=document.getElementById('workout-list-home');
  if(workouts.length===0){
    list.innerHTML=`<div style="color:var(--dim);font-size:13px;">Tocca un giorno nel calendario o crea un nuovo allenamento.</div>`;
    return;
  }
  renderHomeList(workouts.slice().reverse().map(w=>w));
}

function renderHomeList(list){
  const el=document.getElementById('workout-list-home');
  el.innerHTML=list.map(w=>{
    const i=workouts.indexOf(w);
    const done=w.exercises.filter(e=>e.sets.every(s=>s.done)).length;
    const dateStr=w.day+'/'+String(w.month+1).padStart(2,'0')+'/'+w.year;
    return `<div style="position:relative;margin-bottom:10px;">
      <div class="card" onclick="openWorkout(${i})" style="cursor:pointer;margin-bottom:0;padding-right:110px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="color:var(--text);font-size:15px;font-weight:600;">${w.name}</div>
          <span class="tag tag-blue">${dateStr}</span>
        </div>
        <div style="color:var(--muted);font-size:12px;margin-top:4px;">${w.exercises.length} esercizi · ${w.exercises.reduce((a,e)=>a+e.sets.length,0)} set totali</div>
      </div>
      <button onclick="event.stopPropagation();renameWorkoutFromHome(${i})" style="position:absolute;right:60px;top:0;bottom:0;width:46px;border:none;background:#1e3a6e;color:#93c5fd;font-size:15px;cursor:pointer;">✎</button>
      <button onclick="event.stopPropagation();askDeleteWorkout(${i})" style="position:absolute;right:0;top:0;bottom:0;width:60px;border:none;background:#7f1d1d;border-radius:0 14px 14px 0;color:#fca5a5;font-size:11px;font-weight:600;cursor:pointer;">Elimina</button>
    </div>`;
  }).join('');
}

function renameWorkoutFromHome(idx) {
  const w = workouts[idx];
  openRenameModal('Rinomina allenamento', w.name, (newName) => {
    w.name = newName;
    renderAllWorkouts();
    buildCalendar();
  });
}
/* ── ELIMINA ALLENAMENTO ── */
function askDeleteWorkout(idx){
  showConfirm(
    'Elimina allenamento',
    `Vuoi eliminare "${workouts[idx].name}"? L'azione non può essere annullata.`,
    ()=>{
      workouts.splice(idx,1);
      if(currentWorkoutIdx===idx) currentWorkoutIdx=null;
      buildCalendar();
      renderAllWorkouts();
    }
  );
}
function deleteCurrentWorkout(){
  askDeleteWorkout(currentWorkoutIdx);
  goScreen('s-home');
}

/* ── ALLENAMENTO ── */
function openNewWorkout(){
  document.getElementById('workout-name-input').value='';
  document.getElementById('modal-new-workout').style.display='block';
  setTimeout(()=>document.getElementById('workout-name-input').focus(),100);
}
function closeNewWorkoutModal(){document.getElementById('modal-new-workout').style.display='none';}

function createWorkout(){
  const name=document.getElementById('workout-name-input').value.trim()||'Allenamento';
  const now=new Date();
  workouts.push({name,day:now.getDate(),month:now.getMonth(),year:now.getFullYear(),exercises:[]});
  currentWorkoutIdx=workouts.length-1;
  closeNewWorkoutModal();
  buildCalendar();
  renderAllWorkouts();
  renderWorkoutScreen();
  goScreen('s-workout');
}

function openWorkout(idx){
  currentWorkoutIdx=idx;
  renderWorkoutScreen();
  goScreen('s-workout');
}

function renderWorkoutScreen(){
  const w=workouts[currentWorkoutIdx];
  document.getElementById('workout-title-display').textContent=w.name;
  const dateStr=w.day+'/'+String(w.month+1).padStart(2,'0')+'/'+w.year;
  document.getElementById('workout-date-display').textContent=dateStr;
  const list=document.getElementById('workout-exercise-list');
  if(w.exercises.length===0){
    list.innerHTML=`<div style="color:var(--dim);font-size:13px;margin-bottom:16px;">Nessun esercizio. Aggiungine uno sotto.</div>`;
    return;
  }
  list.innerHTML=w.exercises.map((ex,i)=>`
    <div style="position:relative;margin-bottom:10px;">
      <div class="card" onclick="openExDetailFromWorkout(${i})" style="cursor:pointer;margin-bottom:0;padding-right:70px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="color:var(--text);font-size:15px;font-weight:600;">${ex.name}</div>
          <span class="tag tag-blue">${ex.sets.length} set</span>
        </div>
        <div style="color:var(--muted);font-size:12px;margin-top:4px;">Pausa: ${ex.restSeconds}s</div>
      </div>
      <button onclick="askDeleteExercise(${i})" style="position:absolute;right:0;top:0;bottom:0;width:60px;border:none;background:#7f1d1d;border-radius:0 14px 14px 0;color:#fca5a5;font-size:11px;font-weight:600;cursor:pointer;">Elimina</button>
    </div>
  `).join('');
}

/* ── ELIMINA ESERCIZIO ── */
function askDeleteExercise(idx){
  const w=workouts[currentWorkoutIdx];
  showConfirm(
    'Elimina esercizio',
    `Vuoi eliminare "${w.exercises[idx].name}"?`,
    ()=>{
      w.exercises.splice(idx,1);
      renderWorkoutScreen();
      renderActiveScreen();
    }
  );
}
function deleteCurrentExercise(){
  const w=workouts[currentWorkoutIdx];
  showConfirm(
    'Elimina esercizio',
    `Vuoi eliminare "${w.exercises[currentExIdx].name}"?`,
    ()=>{
      w.exercises.splice(currentExIdx,1);
      currentExIdx=null;
      renderActiveScreen();
      renderWorkoutScreen();
      goScreen('s-active');
    }
  );
}

/* ── MODAL AGGIUNGI ESERCIZIO ── */
function showAddExModal(){
  document.getElementById('ex-search-input').value='';
  filterSugg();
  document.getElementById('modal-add-ex').style.display='block';
  setTimeout(()=>document.getElementById('ex-search-input').focus(),100);
}
function closeModal(){document.getElementById('modal-add-ex').style.display='none';}
function filterSugg(){
  const q=document.getElementById('ex-search-input').value.toLowerCase();
  const filtered=SUGGS.filter(s=>s.toLowerCase().includes(q));
  document.getElementById('sugg-list').innerHTML=filtered.map(s=>`<div class="ex-sugg" onclick="selectSugg('${s}')">${s}</div>`).join('');
}
function selectSugg(name){document.getElementById('ex-search-input').value=name;}
function addExerciseFromModal(){
  const name=document.getElementById('ex-search-input').value.trim();
  if(!name) return;
  workouts[currentWorkoutIdx].exercises.push({name,restSeconds:90,note:'',sets:[{kg:0,reps:8,done:false,restSeconds:90}]});
  closeModal();
  renderWorkoutScreen();
}
function openExDetailFromWorkout(idx){
  currentExIdx=idx;currentSetIdx=0;
  renderExDetail();goScreen('s-ex-detail');
}

/* ── DETTAGLIO ESERCIZIO ── */
function renderExDetail(){
  const w=workouts[currentWorkoutIdx];
  const ex=w.exercises[currentExIdx];
  document.getElementById('ex-detail-name').textContent=ex.name;
  document.getElementById('ex-progress-badge').textContent=(currentExIdx+1)+'/'+w.exercises.length;
  document.getElementById('global-timer-input').value=ex.restSeconds;
  document.getElementById('ex-note-input').value=ex.note||'';
  const nextUndone=ex.sets.findIndex((s,i)=>i>=currentSetIdx&&!s.done);
  const activeSet=nextUndone>=0?nextUndone:currentSetIdx;
  document.getElementById('current-set-label').textContent=`Set ${activeSet+1} di ${ex.sets.length}`;
  const body=document.getElementById('detail-sets-body');
  body.innerHTML=ex.sets.map((s,i)=>`
    <div class="set-row" style="${i===activeSet?'background:#1a2a1a;border-radius:8px;':''}">
      <div class="set-num" style="color:${i===activeSet?'var(--blue)':'var(--muted)'};">${i+1}</div>
      <input type="number" value="${s.kg}" min="0" step="0.5" onchange="updateSetVal(${i},'kg',this.value)" style="${s.done?'color:#4ade80;':''}"/>
      <input type="number" value="${s.reps}" min="1" step="1" onchange="updateSetVal(${i},'reps',this.value)" style="${s.done?'color:#4ade80;':''}"/>
      <div class="chk${s.done?' done':''}" onclick="toggleSet(${i})"></div>
      <button class="del-btn" onclick="askDeleteSet(${i})" title="Elimina set">✕</button>
    </div>
    <div style="padding:3px 0 7px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid #111;">
      <span style="color:var(--dim);font-size:11px;padding-left:32px;">Pausa:</span>
      <input type="number" value="${s.restSeconds||ex.restSeconds}" min="0" max="600" style="width:60px;font-size:13px;padding:4px;" onchange="updateSetVal(${i},'restSeconds',this.value)"/>
      <span style="color:var(--dim);font-size:11px;">sec</span>
    </div>
  `).join('');
}

/* ── ELIMINA SET ── */
function askDeleteSet(idx){
  const ex=workouts[currentWorkoutIdx].exercises[currentExIdx];
  if(ex.sets.length<=1){
    showConfirm('Ultimo set','Non puoi eliminare l\'unico set. Elimina l\'esercizio se non ti serve più.',()=>{});
    return;
  }
  showConfirm(
    `Elimina set ${idx+1}`,
    'Vuoi eliminare questo set?',
    ()=>{
      ex.sets.splice(idx,1);
      if(currentSetIdx>=ex.sets.length) currentSetIdx=ex.sets.length-1;
      renderExDetail();
    }
  );
}

function updateSetVal(i,field,val){
  workouts[currentWorkoutIdx].exercises[currentExIdx].sets[i][field]=parseFloat(val)||0;
}
function toggleSet(i){
  const s=workouts[currentWorkoutIdx].exercises[currentExIdx].sets[i];
  s.done=!s.done;renderExDetail();
}
function addSetToEx(){
  const ex=workouts[currentWorkoutIdx].exercises[currentExIdx];
  const last=ex.sets[ex.sets.length-1];
  ex.sets.push({kg:last?last.kg:0,reps:last?last.reps:8,done:false,restSeconds:ex.restSeconds});
  renderExDetail();
}
function applyGlobalTimer(){
  const val=parseInt(document.getElementById('global-timer-input').value)||90;
  const ex=workouts[currentWorkoutIdx].exercises[currentExIdx];
  ex.restSeconds=val;ex.sets.forEach(s=>s.restSeconds=val);
  renderExDetail();
}
function saveNote(){
  workouts[currentWorkoutIdx].exercises[currentExIdx].note=document.getElementById('ex-note-input').value;
}

/* ── AVVIO ALLENAMENTO ── */
function startWorkout(){
  const w=workouts[currentWorkoutIdx];
  if(w.exercises.length===0){alert('Aggiungi almeno un esercizio!');return;}
  w.exercises.forEach(ex=>ex.sets.forEach(s=>s.done=false));
  clockSec=0;
  if(clockInterval) clearInterval(clockInterval);
  clockInterval=setInterval(()=>{
    clockSec++;
    const m=String(Math.floor(clockSec/60)).padStart(2,'0');
    const s=String(clockSec%60).padStart(2,'0');
    const el=document.getElementById('active-clock');
    if(el) el.textContent=m+':'+s;
  },1000);
  document.getElementById('active-workout-name').textContent=w.name;
  renderActiveScreen();goScreen('s-active');
}

function renderActiveScreen(){
  const w=workouts[currentWorkoutIdx];
  if(!w) return;
  document.getElementById('active-ex-list').innerHTML=w.exercises.map((ex,i)=>{
    const done=ex.sets.filter(s=>s.done).length;
    const total=ex.sets.length;
    const allDone=done===total&&total>0;
    return `<div class="active-ex-card${allDone?'':' current-ex'}" onclick="openExFromActive(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="color:var(--text);font-size:15px;font-weight:600;">${ex.name}</div>
        <div style="width:28px;height:28px;border-radius:50%;background:${allDone?'var(--green)':'var(--card2)'};border:1.5px solid ${allDone?'var(--green)':'var(--dim)'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;">${allDone?'✓':''}</div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${total>0?Math.round(done/total*100):0}%"></div></div>
      <div style="color:var(--muted);font-size:12px;">${done}/${total} set · pausa ${ex.restSeconds}s</div>
    </div>`;
  }).join('');
}

function openExFromActive(idx){
  currentExIdx=idx;
  const ex=workouts[currentWorkoutIdx].exercises[idx];
  currentSetIdx=ex.sets.findIndex(s=>!s.done);
  if(currentSetIdx===-1) currentSetIdx=ex.sets.length-1;
  renderExDetail();goScreen('s-ex-detail');
}

/* ── SET + TIMER ── */
function logCurrentSet(){
  const w=workouts[currentWorkoutIdx];
  const ex=w.exercises[currentExIdx];
  const setIdx=ex.sets.findIndex((s,i)=>i>=currentSetIdx&&!s.done);
  const realIdx=setIdx>=0?setIdx:currentSetIdx;
  if(!ex.sets[realIdx]) return;
  ex.sets[realIdx].done=true;
  currentSetIdx=realIdx;
  playShortBeep(660,0.1);
  renderExDetail();
  const rest=ex.sets[realIdx].restSeconds||ex.restSeconds||90;
  const nextSetIdx=realIdx+1;
  const hasNextSet=nextSetIdx<ex.sets.length&&!ex.sets[nextSetIdx].done;
  const nextExIdx=currentExIdx+1;
  const hasNextEx=nextExIdx<w.exercises.length;
  let label='';
  if(hasNextSet) label=`Set ${nextSetIdx+1} — ${ex.name}`;
  else if(hasNextEx) label=w.exercises[nextExIdx].name;
  else label='Ultimo set completato!';
  document.getElementById('timer-next-info').textContent=`Prossimo: ${label}`;
  document.getElementById('timer-label').textContent=`Pausa · ${ex.name}`;
  _goNextFn=()=>{
    if(hasNextSet){currentSetIdx=nextSetIdx;renderExDetail();goScreen('s-ex-detail');}
    else if(hasNextEx){currentExIdx=nextExIdx;currentSetIdx=0;renderExDetail();goScreen('s-ex-detail');}
    else{renderActiveScreen();goScreen('s-active');}
  };
  startTimerScreen(rest);
}

function startTimerScreen(secs){
  timerRemaining=secs;timerTotal=secs;
  if(timerInterval) clearInterval(timerInterval);
  updateTimerUI();goScreen('s-timer');
  timerInterval=setInterval(()=>{
    timerRemaining--;updateTimerUI();
    if(timerRemaining<=0){clearInterval(timerInterval);showAlarmScreen();}
  },1000);
}

function updateTimerUI(){
  const m=Math.floor(timerRemaining/60);
  const s=timerRemaining%60;
  document.getElementById('timer-big').textContent=m+':'+String(s).padStart(2,'0');
  const circ=2*Math.PI*98;
  const pct=timerTotal>0?timerRemaining/timerTotal:0;
  document.getElementById('timer-ring').setAttribute('stroke-dashoffset',Math.round(circ*(1-pct)));
}

function adjustTimer(delta){
  timerRemaining=Math.max(0,timerRemaining+delta);
  timerTotal=Math.max(timerTotal,timerRemaining);
  updateTimerUI();
}
function skipTimer(){if(timerInterval) clearInterval(timerInterval);showAlarmScreen();}

function showAlarmScreen(){
  const w=workouts[currentWorkoutIdx];
  const ex=w.exercises[currentExIdx];
  const nextSetIdx=currentSetIdx+1;
  const hasNextSet=nextSetIdx<ex.sets.length;
  const hasNextEx=(currentExIdx+1)<w.exercises.length;
  let label='';
  if(hasNextSet) label=`Set ${nextSetIdx+1} — ${ex.name}`;
  else if(hasNextEx) label=w.exercises[currentExIdx+1].name;
  else label='Ottimo lavoro! Allenamento quasi finito';
  document.getElementById('alarm-next-label').textContent=`Prossimo: ${label}`;
  goScreen('s-alarm');
  startAlarmSound();
}

function goNextSet(){stopAlarmSound();if(_goNextFn) _goNextFn();}

/* ── FINE ALLENAMENTO ── */
function finishWorkout(){
  if(clockInterval){clearInterval(clockInterval);clockInterval=null;}
  stopAlarmSound();buildCalendar();renderAllWorkouts();goScreen('s-home');
}

/* ── INIT ── */

const today = new Date();

function mkEx(name, reps, sets, restSec) {
  const arr = [];
  for (let i = 0; i < sets; i++) {
    arr.push({ kg: 0, reps: reps, done: false, restSeconds: restSec });
  }
  return { name, restSeconds: restSec, note: 'Reps: ' + reps, sets: arr };
}
